name: marinepred
channels:
  - conda-forge
  - pytorch
  - defaults
dependencies:
  # Python version
  - python=3.11

  # Core numerical computing & data processing
  - numpy>=1.26
  - pandas>=2.2
  - scipy>=1.12
  - scikit-learn>=1.5
  - pyarrow>=16

  # Deep Learning Frameworks
  - pytorch::pytorch>=2.0.0
  - pytorch::torchvision>=0.16.0
  - pytorch::torchaudio>=2.0.0
  - pytorch::pytorch-cuda=11.8
  - jax>=0.4.20
  - jaxlib>=0.4.20
  - tensorflow>=2.14.0

  # Transformers & NLP
  - transformers>=4.40.0
  - huggingface_hub>=0.20.0

  # Web & Dashboard
  - flask>=3.0.0
  - fastapi>=0.110.0
  - uvicorn>=0.29.0
  - streamlit>=1.40.0
  - dash>=2.14.0

  # Visualization
  - matplotlib>=3.8.0
  - plotly>=5.18.0
  - altair>=5.0.0
  - seaborn>=0.13.0

  # Data formats & serialization
  - netCDF4>=1.6.0
  - h5py>=3.10.0
  - pyyaml>=6.0
  - json5>=0.9.0

  # Configuration & validation
  - pydantic>=2.7.0
  - python-dotenv>=1.0.0

  # Data handling & persistence
  - joblib>=1.4.0
  - dask>=2024.2.0
  - xarray>=2024.2.0

  # Domain-specific packages
  - utide>=0.3.0
  - pvlib>=0.10.0
  - gsw>=3.6.0

  # Jupyter & notebooks
  - jupyter>=1.0.0
  - jupyterlab>=4.0.0
  - ipython>=8.0.0
  - ipykernel>=6.0.0
  - ipywidgets>=8.0.0
  - nbconvert>=7.0.0
  - nbformat>=5.0.0

  # Progress bars & CLI tools
  - tqdm>=4.66.0
  - rich>=13.7.0
  - click>=8.0.0

  # Testing & quality assurance
  - pytest>=8.0.0
  - pytest-cov>=4.0.0
  - pytest-asyncio>=0.21.0
  - ruff>=0.5.0
  - mypy>=1.10.0
  - black>=24.1.0
  - isort>=5.13.0

  # Development tools
  - git>=2.40.0
  - curl>=8.0.0
  - wget>=1.21.0

  # Scientific & statistical computing
  - statsmodels>=0.14.0
  - sympy>=1.12.0
  - numba>=0.58.0

  # Debugging & profiling
  - ipdb>=0.13.0
  - memory-profiler>=0.61.0
  - line-profiler>=4.0.0

  # Async & concurrency
  - aiohttp>=3.9.0
  - asyncio-contextmanager>=1.0.0

pip:
  - torch-geometric>=2.5.0
  - pytorch-lightning>=2.2.0
  - lightning-utilities>=0.11.0
  - optuna>=3.5.0
  - wandb>=0.16.0
  - mlflow>=2.10.0
  - tensorboard>=2.15.0
  - torchmetrics>=1.3.0
  - einops>=0.7.0
  - timm>=0.9.0
  - timeseries-dl>=0.1.0
  - sktime>=0.14.0
  - prophet>=1.1.5

project_name: portland_itransformer_atmosphere_timexer

site:
  name: Portland Harbor
  latitude: 43.657
  longitude: -70.246
  timezone: UTC

data:
  cadence_minutes: 15
  seq_len: 672
  pred_len: 96
  baseline_fit_days: 60
  train_target_start: "2025-01-01"
  train_target_end: "2025-06-16"
  val_target_start: "2025-06-17"
  val_target_end: "2025-08-10"
  test_target_start: "2025-08-11"
  test_target_end: "2025-10-05"
  train_stride_steps: 96
  eval_stride_steps: 96

model:
  d_model: 64
  n_heads: 4
  e_layers: 2
  d_ff: 128
  dropout: 0.25
  use_instance_norm: true

training:
  batch_size: 16
  num_workers: 0
  epochs: 40
  learning_rate: 0.0002
  weight_decay: 0.0003
  early_stopping_patience: 6
  scheduler_patience: 3
  scheduler_factor: 0.5
  grad_clip_norm: 1.0
  use_amp_if_cuda: true

reconstruction:
  eps: 0.0001
  solar_daylight_threshold_wm2: 20.0
  clearness_index_max: 2.0
  rh_clip_min: 0.0
  rh_clip_max: 100.0

paths:
  raw_csv: data/raw/portland_harbor_2025_15min_synthetic_calibrated.csv
  processed_dir: data/processed
  artifacts_dir: artifacts
  outputs_dir: outputs/atmosphere_timexer
